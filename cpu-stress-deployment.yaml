apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-stress
spec:
  replicas: 8
  selector:
    matchLabels:
      app: cpu-stress
  template:
    metadata:
      labels:
        app: cpu-stress
    spec:
      containers:
      - name: cpu-stress
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            sha256sum /dev/zero
          done
        resources:
          requests:
            cpu: "500m"
          limits:
            cpu: "1000m"